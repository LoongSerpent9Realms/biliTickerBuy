name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            python-version: '3.11'
            artifact-name: biliTickerBuy-windows
            exe-name: biliTickerBuy.exe
          - os: macos-latest
            python-version: '3.11'
            artifact-name: biliTickerBuy-macos
            exe-name: biliTickerBuy
          - os: ubuntu-latest
            python-version: '3.11'
            artifact-name: biliTickerBuy-linux
            exe-name: biliTickerBuy

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller main.spec --noconfirm

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller main.spec --noconfirm

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller main.spec --noconfirm

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.exe-name }}
          retention-days: 30

      - name: Upload artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.exe-name }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.create_release == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: biliTickerBuy-windows
          path: release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: biliTickerBuy-macos
          path: release/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: biliTickerBuy-linux
          path: release/linux

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: biliTickerBuy v${{ steps.version.outputs.version }}
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          files: |
            release/windows/biliTickerBuy.exe
            release/macos/biliTickerBuy
            release/linux/biliTickerBuy
          body: |
            ## biliTickerBuy v${{ steps.version.outputs.version }}
            
            ### 下载说明
            - **Windows**: 下载 `biliTickerBuy.exe`
            - **macOS**: 下载 `biliTickerBuy` (需要在终端中运行 `chmod +x biliTickerBuy`)
            - **Linux**: 下载 `biliTickerBuy` (需要在终端中运行 `chmod +x biliTickerBuy`)
            
            ### 使用方法
            运行程序后访问 http://127.0.0.1:7860 使用 Web UI
            
            或使用命令行模式:
            ```bash
            biliTickerBuy buy tickets.json
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
